<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rama's Properties</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F5EFE0;color:#1a1a1a}
    .rp-header{background:#1B4D4A;padding:2rem 1.5rem 1.5rem;text-align:center;border-bottom:3px solid #C9903A}
    .rp-ornament{display:flex;justify-content:center;gap:6px;margin-bottom:1rem}
    .rp-diamond{width:8px;height:8px;background:#C9903A;transform:rotate(45deg)}
    .rp-diamond.sm{width:5px;height:5px;margin-top:1.5px}
    .rp-brand{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,28px);font-weight:600;color:#F5EFE0;letter-spacing:.03em;margin:0 0 4px}
    .rp-tagline{font-size:13px;color:#C9903A;letter-spacing:.12em;text-transform:uppercase;font-weight:300;margin:0 0 1rem}
    .rp-ig-link{display:inline-flex;align-items:center;gap:6px;background:rgba(201,144,58,.15);border:1px solid rgba(201,144,58,.4);color:#C9903A;text-decoration:none;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;letter-spacing:.05em;transition:background .2s}
    .rp-ig-link:hover{background:rgba(201,144,58,.28)}
    .rp-grid{display:grid;grid-template-columns:1fr;gap:1.25rem;padding:1.5rem 1rem 2rem;max-width:900px;margin:0 auto}
    @media(min-width:540px){.rp-grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:820px){.rp-grid{grid-template-columns:repeat(3,1fr)}}
    .rp-card{background:#FFFDF7;border-radius:12px;overflow:hidden;border:1px solid rgba(201,144,58,.2);display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
    .rp-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(27,77,74,.12)}
    .rp-img-wrap{width:100%;aspect-ratio:1/1;overflow:hidden;background:#E8E0D0;position:relative}
    .rp-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .rp-badge{position:absolute;top:10px;left:10px;background:#1B4D4A;color:#F5EFE0;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;font-weight:500}
    .rp-card-body{padding:1rem 1rem .75rem;flex:1;display:flex;flex-direction:column;gap:4px}
    .rp-title{font-size:14px;font-weight:500;color:#1a1a1a;margin:0;line-height:1.4}
    .rp-price{font-family:'Playfair Display',serif;font-size:16px;color:#C9903A;font-weight:600;margin:0}
    .rp-location{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:#1B4D4A;background:rgba(27,77,74,.08);border-radius:4px;padding:2px 7px 2px 5px;margin:2px 0 4px;width:fit-content}
    .rp-desc{font-size:12px;color:#7a7a7a;line-height:1.6;margin:0}
    .rp-desc.collapsed{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .rp-toggle{background:none;border:none;color:#C9903A;font-size:12px;font-weight:500;cursor:pointer;padding:4px 0 0;text-align:left;font-family:'DM Sans',sans-serif}
    .rp-toggle:hover{text-decoration:underline}
    .rp-card-footer{padding:0 1rem 1rem}
    .rp-cta{display:block;width:100%;text-align:center;background:#1B4D4A;color:#F5EFE0;text-decoration:none;padding:9px 0;border-radius:8px;font-size:13px;font-weight:500;letter-spacing:.04em;transition:background .2s;border:none;cursor:pointer}
    .rp-cta:hover{background:#153d3a}
    .rp-footer{background:#1B4D4A;text-align:center;padding:1.5rem;border-top:3px solid #C9903A}
    .rp-footer p{color:rgba(245,239,224,.6);font-size:12px;margin:4px 0 0}
    .rp-footer strong{font-family:'Playfair Display',serif;color:#F5EFE0;font-size:15px;font-weight:400;letter-spacing:.06em}
  </style>
</head>
<body>
  <header class="rp-header">
    <div class="rp-ornament">
      <div class="rp-diamond sm"></div>
      <div class="rp-diamond"></div>
      <div class="rp-diamond sm"></div>
    </div>
    <h1 class="rp-brand">Rama's Properties</h1>
    <p class="rp-tagline">Properties for Muslims in Indonesia</p>
    <a href="https://instagram.com/ramasproperties" class="rp-ig-link" target="_blank">
      <i class="ti ti-brand-instagram" aria-hidden="true"></i>
      @ramasproperties
    </a>
  </header>

  <div class="rp-grid" id="listing-grid"></div>

  <footer class="rp-footer">
    <strong>Rama's Properties</strong>
    <p>Properties for Muslims in Indonesia</p>
  </footer>

  <script>
    const listings = [
      {
        title: "Rumah Dijual di Sleman, Yogyakarta Lokasi Strategis",
        price: "Rp 1.200.000.000",
        location: "Sleman, Yogyakarta",
        description: "Rumah mewah 2 lantai siap huni di Tridadi, Sleman, Jogja. Berjarak cuma 100 meter dari masjid, hunian dengan LB 200m² dan LT 100m² ini memadukan arsitektur modern dengan aksen batu alam mewah. Fasilitas premium: 5 kamar tidur, 3 kamar mandi, lantai granit, dan carport luas. Lokasi sangat strategis, tepat di samping GOR Koni Sleman. Dapatkan harga promo Rp1,2 Milyar (diskon Rp400 juta dari harga pasar). Yuk, jadwalkan survei sekarang!",
        badge: "Dijual",
        img: "3.jpg",
        docUrl: "https://www.instagram.com/p/DZZgbXtEZb2/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
      },
      {
        title: "Kost Murah, Lengkap, dan Strategis Dekat UGM",
        price: "Rp 600.000/bulan",
        location: "Sleman, Yogyakarta",
        description: "Kost murah & strategis dekat UGM untuk mahasiswa/pekerja. Berlokasi di Sinduadi, Sleman, hunian Rama's Properties ini cuma 1 KM ke UGM dan 100M ke Ringroad Monjali. Lorong hunian nyaman. Sangat ramah Muslim karena berjarak 100M ke masjid. Fasilitas gratis Wi-Fi, kasur, lemari, listrik, kamar mandi dalam, dan parkir aman. Sewa murah: Rp600.000 (Lantai 1) & Rp650.000 (Lantai 2) per bulan. Slot terbatas, yuk pesan kamarmu sekarang!",
        badge: "Dikontrakkan",
        img: "1.jpg",
        docUrl: "https://www.instagram.com/p/DZThPTvmFTV/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
      },
      {
        title: "Kost yang Lengkap dan Lingkungan yang Suportif",
        price: "Rp 550.000/bulan",
        location: "Sleman, Yogyakarta",
        description: "Kost nyaman dan strategis di Tridadi, Sleman dengan suasana desa yang tenang dan rukun. Rumah kost ini menawarkan hunian bebas drama hanya Rp550.000/bulan! Fasilitasnya lengkap, sudah termasuk kasur, kamar mandi dalam, listrik, WiFi gratis, serta area parkir aman. Lokasinya sangat juara: hanya 50 meter ke masjid, 500 meter ke pom bensin, 1 km ke pasar, dan 3 km ke Sleman City Hall (SCH) serta Pemda. Slot terbatas, yuk hubungi kami sebelum kehabisan!",
        badge: "Dikontrakkan",
        img: "2.jpg",
        docUrl: "https://www.instagram.com/p/DY_VQF_EQV2/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
      }
    ];

    const grid = document.getElementById('listing-grid');
    listings.forEach(p => {
      grid.innerHTML += `
        <div class="rp-card">
          <div class="rp-img-wrap">
            <img src="${p.img}" alt="${p.title}" loading="lazy"/>
            <span class="rp-badge">${p.badge}</span>
          </div>
          <div class="rp-card-body">
            <p class="rp-title">${p.title}</p>
            <p class="rp-price">${p.price}</p>
            <span class="rp-location"><i class="ti ti-map-pin" style="font-size:12px" aria-hidden="true"></i>${p.location}</span>
            <p class="rp-desc collapsed">${p.description}</p>
            <button class="rp-toggle" onclick="toggleDesc(this)">Selengkapnya ▾</button>
          </div>
          <div class="rp-card-footer">
            <a href="${p.docUrl}" class="rp-cta" target="_blank">Dokumentasi</a>
          </div>
        </div>`;
    });

    function toggleDesc(btn) {
      const desc = btn.previousElementSibling;
      const collapsed = desc.classList.toggle('collapsed');
      btn.textContent = collapsed ? 'Selengkapnya ▾' : 'Sembunyikan ▴';
    }
  </script>
</body>
</html>
